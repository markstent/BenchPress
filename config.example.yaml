  #     max_tokens: 4096
  #     temperature: 0

  # Hugging Face Inference API (free tier, uses OpenAI-compatible endpoint)
  # Requires: HF_TOKEN env var (free account at huggingface.co)
  # Rate limit: ~few hundred requests/hour on free tier (enough for 80 prompts)


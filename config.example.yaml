# Default configuration for llm-eval
# Copy to config.yaml and fill in your API keys

models:
  # Add models you want to test. Each entry needs:
  #   provider: anthropic | openai | google | ollama | openai_compatible
  #   model: the model string
  #   api_key_env: name of env var holding your API key
  #   company: (optional) company name for dashboard grouping
  #   launch_date: (optional) YYYY-MM-DD for timeline chart
  #   params: optional generation params

  claude-sonnet:
    provider: anthropic
    model: claude-sonnet-4-20250514
    company: Anthropic
    launch_date: "2025-05-14"
    api_key_env: ANTHROPIC_API_KEY
    params:
      max_tokens: 4096
      temperature: 0

  gpt-4o:
    provider: openai
    model: gpt-4o
    company: OpenAI
    launch_date: "2024-05-13"
    api_key_env: OPENAI_API_KEY
    params:
      max_tokens: 4096
      temperature: 0

  # gemini-pro:
